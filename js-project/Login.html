<body>
    <div class="logincon">

                    </div>

            </div>
            <div class="right">
                <div class="bigtext2">Signup Form</div>
                <div class="email2"><input type="email" placeholder="Email Adress" name="" id="loginemail2"></div>
                <div class="password2"><input type="password" placeholder="Password" name="" id="loginpassword2"></div>
                <div class="confirm"><input type="password" placeholder="Confiirm Password" name="" id="passwordcopy2"></div>
                <div class="smalltext2">Signup</div>
            </div>
            <div class="button4"><a class="button2" href="phone.html">Back to initial page.</a></div>
        </div>
