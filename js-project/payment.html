<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="payment.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid bg-black p-2 d-flex flex-row justify-content-between align-items-center text-white ">
        <div class="pic">
            <a href="phone.html"><img src="unnamed (1).jpg" class="picture" alt=""></a>
        </div>
        <div class="text fs-3 fw-bold">Complete Your Payment Safely With Us👮🏽</div>
        <div class="text2"></div>
    </div>
    <div class="box-div p-0  p-lg-0 bg-black">
        <div class="box p-2 p-lg-3 h-100 bg-black">
            <div class="row p-lg-3" style="height: 100%;">
                <div class="col-12 col-lg-6 p-0">
                    <div class="big-text d-flex flex-column">
                        <div class="f1 fs-1 text-white fw-bold">Payment</div>
                        <i class="f2 fs-1 text-white">Method</i>
                    </div>
                    <div class="inputs">
                        <form class="p-4">

                            <div class="mb-3">
                                <label class="form-label text-white">Name</label>
                                <input type="text" class="form-control" placeholder="Michael Jackson" required>
                            </div>

                            <div class="mb-3 d-flex flex-column">
                                <label class="form-label text-white">Card Number</label>
                                <input type="number" class="form-control" id="inp1" placeholder="1234 5678 9012 3456" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-white">Expiry Date</label>
                                    <input type="number" class="form-control" id="inp2" placeholder="MM/YY" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-white">CVV</label>
                                    <input type="password" class="form-control" id="inp3" placeholder="123" required>
                                </div>
                            </div>

                        </form>
                    </div>
                    <div class="card-types d-flex flex-column justify-content-center align-items-center gap-4">

                        <div class="text-white fs-4 d-none d-lg-block">
                            Choose a type of card you want to pay:
                        </div>

                        <div class="types d-none d-lg-flex flex-wrap gap-3">

                            <div class="form-check d-flex gap-2">
                                <input class="form-check-input" type="radio" name="cardType" id="uzcard">
                                <label class="form-check-label text-white" for="uzcard">UzCard</label>
                            </div>

                            <div class="form-check d-flex gap-2">
                                <input class="form-check-input" type="radio" name="cardType" id="humo">
                                <label class="form-check-label text-white" for="humo">Humo</label>
                            </div>

                            <div class="form-check d-flex gap-2">
                                <input class="form-check-input" type="radio" name="cardType" id="visa">
                                <label class="form-check-label text-white" for="visa">Visa</label>
                            </div>

                            <div class="form-check d-flex gap-2">
                                <input class="form-check-input" type="radio" name="cardType" id="uzum">
                                <label class="form-check-label text-white" for="uzum">Uzum</label>
                            </div>


                        </div>
                        <div class="button1">Save</div>
                    </div>
                </div>
                <div class="col-12 col-lg-6 p-4  align-items-center d-flex flex-column gap-3">
                    <div class="my-card w-75"><img src="Payment options on display .png" class="image d-none d-md-none d-lg-block"
                            alt=""></div>
                    <div class="box2 gap-3 d-flex flex-column">
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="payment.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
